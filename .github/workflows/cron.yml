name: Poll & Classify

on:
  schedule:
    # Every 2 hours
    - cron: '0 */2 * * *'
  workflow_dispatch: # Allow manual trigger

jobs:
  poll:
    runs-on: ubuntu-latest
    steps:
      - name: Poll sources
        run: |
          response=$(curl -sL -w "\n%{http_code}" -X POST "${{ secrets.APP_URL }}/api/cron/poll" \
            -H "Authorization: Bearer ${{ secrets.CRON_SECRET }}" \
            -H "Content-Type: application/json" \
            --max-time 120)

          http_code=$(echo "$response" | tail -1)
          body=$(echo "$response" | head -n -1)

          echo "Poll response ($http_code): $body"

          if [ "$http_code" -ne 200 ]; then
            echo "::warning::Poll returned $http_code"
          fi

  classify:
    runs-on: ubuntu-latest
    needs: poll
    steps:
      - name: Classify articles
        run: |
          response=$(curl -sL -w "\n%{http_code}" -X POST "${{ secrets.APP_URL }}/api/cron/classify" \
            -H "Authorization: Bearer ${{ secrets.CRON_SECRET }}" \
            -H "Content-Type: application/json" \
            --max-time 300)

          http_code=$(echo "$response" | tail -1)
          body=$(echo "$response" | head -n -1)

          echo "Classify response ($http_code): $body"

          if [ "$http_code" -ne 200 ]; then
            echo "::error::Classify returned $http_code"
            exit 1
          fi

  populate:
    runs-on: ubuntu-latest
    needs: classify
    steps:
      - name: Populate user queues
        run: |
          response=$(curl -sL -w "\n%{http_code}" -X POST "${{ secrets.APP_URL }}/api/cron/populate" \
            -H "Authorization: Bearer ${{ secrets.CRON_SECRET }}" \
            -H "Content-Type: application/json" \
            --max-time 120)

          http_code=$(echo "$response" | tail -1)
          body=$(echo "$response" | head -n -1)

          echo "Populate response ($http_code): $body"

          if [ "$http_code" -ne 200 ]; then
            echo "::warning::Populate returned $http_code"
          fi
